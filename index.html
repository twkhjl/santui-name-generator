<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>假名產生器</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/jspdf@3.0.1/dist/jspdf.umd.min.js"
    ></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <main class="page">
      <section class="controls">
        <label class="field">
          <span>標題文字</span>
          <textarea id="header-input" rows="3"></textarea>
        </label>
        <label class="field field-inline">
          <span>PDF 頁數</span>
          <input id="page-count-input" type="number" min="1" step="1" value="1" />
        </label>
        <div class="actions">
          <button id="generate-button" type="button">產生名字</button>
          <button id="export-button" type="button">匯出 PDF</button>
        </div>
        <p id="status" class="status" role="status"></p>
      </section>

      <section class="preview-panel" aria-label="預覽分頁">
        <div class="preview-toolbar">
          <button id="preview-prev-button" type="button" class="preview-nav">上一頁</button>
          <div class="preview-jump-group">
            <label class="sr-only" for="preview-page-select">跳轉頁碼</label>
            <select id="preview-page-select"></select>
            <button id="preview-jump-button" type="button" class="preview-jump-button">跳轉</button>
          </div>
          <p id="preview-page-indicator" class="preview-page-indicator" aria-live="polite">0 / 0</p>
          <button id="preview-next-button" type="button" class="preview-nav">下一頁</button>
        </div>
        <div class="preview-sheet-frame">
          <div id="preview-sheet" class="preview-sheet"></div>
        </div>
      </section>

      <div id="print-sheets" class="sheets sheets-export" aria-hidden="true"></div>
    </main>
  </body>
</html>

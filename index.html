<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>假名產生器</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="page">
      <section class="controls">
        <label class="field">
          <span>上方文字</span>
          <textarea id="header-input" rows="3"></textarea>
        </label>
        <label class="field field-inline">
          <span>PDF 頁數</span>
          <input id="page-count-input" type="number" min="1" step="1" value="1" />
        </label>
        <div class="actions">
          <button id="generate-button" type="button">產生名字</button>
          <button id="export-button" type="button">匯出 PDF</button>
        </div>
        <p id="status" class="status" role="status"></p>
      </section>

      <div id="print-sheets" class="sheets"></div>
    </main>
  </body>
</html>

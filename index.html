<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三退化名產生器</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/jspdf@3.0.1/dist/jspdf.umd.min.js"
    ></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <div id="export-loader" class="export-loader" aria-hidden="true">
      <div class="export-loader__panel" role="status" aria-live="polite">
        <div class="export-loader__seal" aria-hidden="true">
          <span class="export-loader__ring export-loader__ring--outer"></span>
          <span class="export-loader__ring export-loader__ring--inner"></span>
        </div>
        <p class="export-loader__title">PDF 匯出中</p>
        <p class="export-loader__text">請稍候，正在整理頁面與字型。</p>
      </div>
    </div>

    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="./index.html">三退化名產生器</a>
        <nav class="site-nav" aria-label="主要導覽">
          <a class="site-nav__link site-nav__link--active" href="./index.html" aria-current="page">首頁</a>
          <a class="site-nav__link" href="./contact.html">聯絡我們</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="controls">
        <label class="field">
          <span>標題文字</span>
          <textarea id="header-input" rows="3"></textarea>
        </label>
        <label class="field field-inline">
          <span>PDF 頁數</span>
          <input id="page-count-input" type="number" min="1" step="1" value="1" />
        </label>
        <div class="actions">
          <button id="generate-button" type="button">產生名字</button>
          <button id="export-button" type="button">匯出 PDF</button>
        </div>
        <p id="status" class="status" role="status"></p>
      </section>

      <section class="preview-panel" aria-label="預覽分頁">
        <div class="preview-toolbar">
          <button id="preview-prev-button" type="button" class="preview-nav preview-nav--icon" aria-label="上一頁">
            <span aria-hidden="true">‹</span>
          </button>
          <div class="preview-jump-group">
            <label class="sr-only" for="preview-page-select">跳轉頁碼</label>
            <select id="preview-page-select"></select>
          </div>
          <button id="preview-next-button" type="button" class="preview-nav preview-nav--icon" aria-label="下一頁">
            <span aria-hidden="true">›</span>
          </button>
        </div>

        <section id="name-editor-panel"></section>

        <div class="preview-sheet-frame">
          <div id="preview-sheet" class="preview-sheet"></div>
        </div>
      </section>

      <div id="print-sheets" class="sheets sheets-export" aria-hidden="true"></div>
    </main>
  </body>
</html>
